<!DOCTYPE html>
<html>
<head>

<title>Resize Image to 20KB 30KB 40KB 50KB Online Free</title>

<meta name="description" content="Free online tool to resize and compress images to 20KB, 30KB, 40KB, or 50KB. Crop and download images instantly.">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin:0;
padding:0;
}

.container{
background:white;
max-width:420px;
width:95%;
margin:30px auto;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.drop-box{
border:2px dashed #aaa;
padding:25px;
margin-top:20px;
border-radius:10px;
background:#fafafa;
cursor:pointer;
}

.drop-box img{
max-width:100%;
margin-top:10px;
}

.select-btn{
padding:10px 20px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
cursor:pointer;
margin-top:10px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.quick button{
background:#28a745;
}

.quick button:hover{
background:#1e7e34;
}

.info{
margin-top:35px;
text-align:left;
font-size:14px;
line-height:1.6;
}

.social a{
text-decoration:none;
margin-right:15px;
font-weight:bold;
color:#333;
}

.social img{
width:20px;
vertical-align:middle;
margin-right:6px;
}

.size-info{
margin-top:10px;
font-size:14px;
color:#444;
}

.share-btn{
margin-top:15px;
display:inline-block;
background:#25D366;
color:white;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Image Resize in KB</h1>

<p>Compress images to 20KB, 30KB, 40KB or 50KB</p>

<div class="drop-box" id="dropBox">

<p>Drag & Drop Image Here</p>
<p>OR</p>

<button class="select-btn" onclick="document.getElementById('imageInput').click()">Select Image</button>

<input type="file" id="imageInput" accept="image/*" hidden>

<img id="preview">

<div class="size-info" id="originalSize"></div>

</div>

<br>

<button id="cropBtn" style="display:none;">Crop Image</button>

<br><br>

<label>Enter Size (KB)</label><br>
<input type="number" id="size" placeholder="50">

<br><br>

<div class="quick">
<button onclick="setSize(20)">20 KB</button>
<button onclick="setSize(30)">30 KB</button>
<button onclick="setSize(40)">40 KB</button>
<button onclick="setSize(50)">50 KB</button>
</div>

<br>

<button onclick="resizeImage()">Resize Image</button>

<br><br>

<button id="downloadBtn" style="display:none;">Download Image</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>

let finalBlob;
let cropper;

let dropBox=document.getElementById("dropBox");

dropBox.onclick=()=>document.getElementById("imageInput").click();

dropBox.addEventListener("dragover",(e)=>{
e.preventDefault();
});

dropBox.addEventListener("drop",(e)=>{
e.preventDefault();
let file=e.dataTransfer.files[0];
loadImage(file);
});

document.getElementById("imageInput").addEventListener("change",function(e){
loadImage(e.target.files[0]);
});

function loadImage(file){

let reader=new FileReader();

document.getElementById("originalSize").innerText =
"Original Size: "+(file.size/1024).toFixed(1)+" KB";

reader.onload=function(e){

let img=document.getElementById("preview");
img.src=e.target.result;

document.getElementById("cropBtn").style.display="inline-block";

if(cropper) cropper.destroy();

cropper=new Cropper(img,{viewMode:1});

}

reader.readAsDataURL(file);

}

document.getElementById("cropBtn").onclick=function(){

let canvas=cropper.getCroppedCanvas();
document.getElementById("preview").src=canvas.toDataURL();
cropper.destroy();

}

function setSize(kb){
document.getElementById("size").value=kb;
}

function resizeImage(){

let img=document.getElementById("preview");
let targetKB=document.getElementById("size").value;

let image=new Image();

image.onload=function(){

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=image.width;
canvas.height=image.height;

ctx.drawImage(image,0,0);

let min=0;
let max=1;
let quality=0.9;

function compress(){

canvas.toBlob(function(blob){

let sizeKB=blob.size/1024;

if(Math.abs(sizeKB-targetKB)<1){

finalBlob=blob;
document.getElementById("downloadBtn").style.display="inline-block";
return;

}

if(sizeKB>targetKB){
max=quality;
}else{
min=quality;
}

quality=(min+max)/2;

if(max-min<0.01){
finalBlob=blob;
document.getElementById("downloadBtn").style.display="inline-block";
return;
}

compress();

},"image/jpeg",quality);

}

compress();

}

image.src=img.src;

}

document.getElementById("downloadBtn").onclick=function(){

let a=document.createElement("a");
a.href=URL.createObjectURL(finalBlob);
a.download="compressed-image.jpg";
a.click();

}

</script>

</body>
</html>
